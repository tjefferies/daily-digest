# Default per-workstream phase assignments (design document section 6.3).
# "Late EVT" for thermal is modeled as "EVT" - the scoring matrix
# treats it identically for atom-type relevance.

default_phases:
  chassis: DVT
  drivetrain: DVT
  thermal: EVT
  power-systems: DVT
  sensors: EVT
  firmware: EVT
  end-effector: Concept
