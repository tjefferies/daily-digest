# Pipeline configuration: model IDs, token limits, thresholds, CORS.

# LLM provider: 'anthropic', 'openai', or 'google'.
provider: anthropic

# Model used for extraction and generation.
model: claude-haiku-4-5

# Token limits.
extraction_max_tokens: 4096
generation_max_tokens: 8192
validation_max_tokens: 512

# Context window assembly.
context_window:
  max_tokens: 4000
  tail_count: 5
  chars_per_token: 4

# Thread continuation detection (Pass 2).
continuations:
  similarity_threshold: 0.45
  embedding_model: all-MiniLM-L6-v2

# Persistent FAISS vector store for embedding cache.
vectorstore:
  path: data/vectorstore.index

# Dataset: 'full' (307 messages) or 'demo' (18 messages, fast extraction).
dataset: full

# Extraction mode: 'batch' (50% cost savings, slower) or 'async' (faster, higher cost).
extraction_mode: batch

# Maximum context windows to process per pipeline run (0 = all).
max_windows: 0

# Maximum concurrent LLM calls for non-batch extraction.
max_concurrency: 2

# Maximum requests per batch API call (splits larger batches).
max_requests_per_batch: 200

# Validation rate limiting.
validation_max_concurrency: 5
validation_delay_between_chunks: 1.0

# Extraction confidence filter threshold.
confidence_threshold: 0.7

# Postgres connection (bundle/atom persistence).
postgres:
  dsn: postgresql+asyncpg://evercurrent:evercurrent_dev@localhost:5432/evercurrent

# Neo4j knowledge graph connection.
neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: evercurrent_dev

# CORS allowed origins for the FastAPI app.
cors_origins:
  - "http://localhost:5173"
  - "http://localhost:3000"
