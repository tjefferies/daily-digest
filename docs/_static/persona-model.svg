<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4edda"/><stop offset="100%" stop-color="#c3e6cb"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f4fd"/><stop offset="100%" stop-color="#d1ecf9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3cd"/><stop offset="100%" stop-color="#ffeeba"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8daef"/><stop offset="100%" stop-color="#d7bde2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1f2eb"/><stop offset="100%" stop-color="#a3e4d7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8d7da"/><stop offset="100%" stop-color="#f5c6cb"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="375" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Persona Model Structure</text>

  <!-- Center: Persona Card -->
  <rect x="260" y="120" width="230" height="90" rx="8" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5e2a">Maya Chen</text>
  <text x="375" y="163" text-anchor="middle" font-size="10" fill="#2d6a3f">Senior Mechanical Engineer</text>
  <text x="375" y="178" text-anchor="middle" font-size="10" fill="#2d6a3f">IC Engineer archetype</text>
  <text x="375" y="195" text-anchor="middle" font-size="9" fill="#2d6a3f">User ID: U001</text>

  <!-- Lines from center to satellites -->
  <line x1="260" y1="145" x2="210" y2="85" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="490" y1="145" x2="540" y2="85" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="260" y1="190" x2="210" y2="270" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="490" y1="190" x2="540" y2="270" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="375" y1="210" x2="375" y2="300" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Top-left: Workstream Affinities -->
  <rect x="20" y="42" width="210" height="75" rx="6" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="125" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a4a6e">Workstream Affinities</text>
  <text x="125" y="76" text-anchor="middle" font-size="8" fill="#2c6690">chassis: 1.0 | thermal: 0.85</text>
  <text x="125" y="89" text-anchor="middle" font-size="8" fill="#2c6690">drivetrain: 0.4 | supply-chain: 0.3</text>
  <text x="125" y="102" text-anchor="middle" font-size="8" fill="#5499c7">weighted topic interest vector</text>

  <!-- Top-right: Phase Context -->
  <rect x="520" y="42" width="210" height="75" rx="6" fill="url(#orangeGrad)" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="625" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d4e00">Phase Context</text>
  <text x="625" y="76" text-anchor="middle" font-size="8" fill="#9a6b1e">chassis: DVT | thermal: EVT</text>
  <text x="625" y="89" text-anchor="middle" font-size="8" fill="#9a6b1e">drivetrain: DVT</text>
  <text x="625" y="102" text-anchor="middle" font-size="8" fill="#9a6b1e">per-workstream, not per-project</text>

  <!-- Bottom-left: Scoring Weights -->
  <rect x="20" y="240" width="210" height="75" rx="6" fill="url(#purpleGrad)" stroke="#8e44ad" stroke-width="1" filter="url(#shadow)"/>
  <text x="125" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#512e5f">Scoring Weights</text>
  <text x="125" y="274" text-anchor="middle" font-size="8" fill="#6c3483">workstream: 0.30 | role: 0.20</text>
  <text x="125" y="287" text-anchor="middle" font-size="8" fill="#6c3483">phase: 0.20 | urgency: 0.15</text>
  <text x="125" y="300" text-anchor="middle" font-size="8" fill="#6c3483">social: 0.15 | persona-specific</text>

  <!-- Bottom-right: Digest Preferences -->
  <rect x="520" y="240" width="210" height="75" rx="6" fill="url(#tealGrad)" stroke="#1abc9c" stroke-width="1" filter="url(#shadow)"/>
  <text x="625" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e6655">Digest Preferences</text>
  <text x="625" y="274" text-anchor="middle" font-size="8" fill="#148f77">max_items: 25</text>
  <text x="625" y="287" text-anchor="middle" font-size="8" fill="#148f77">critical_threshold: 0.85</text>
  <text x="625" y="300" text-anchor="middle" font-size="8" fill="#148f77">include_broader_context: true</text>

  <!-- Bottom-center: Collaborator Graph -->
  <rect x="280" y="305" width="190" height="50" rx="6" fill="url(#redGrad)" stroke="#c0392b" stroke-width="1" filter="url(#shadow)"/>
  <text x="375" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b241c">Collaborator Graph</text>
  <text x="375" y="340" text-anchor="middle" font-size="8" fill="#943126">U003, U008, U013, U020</text>

  <!-- Bottom summary -->
  <text x="375" y="385" text-anchor="middle" font-size="10" fill="#5d6d7e">3 demo personas: Maya Chen (ME) | Elena Vasquez (Supply Chain) | Ryan Torres (EM)</text>
</svg>
