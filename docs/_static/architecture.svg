<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#d1ecf9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4edda"/>
      <stop offset="100%" stop-color="#c3e6cb"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3cd"/>
      <stop offset="100%" stop-color="#ffeeba"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8d7da"/>
      <stop offset="100%" stop-color="#f5c6cb"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8daef"/>
      <stop offset="100%" stop-color="#d7bde2"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">EverCurrent V2 Architecture</text>
  <text x="410" y="50" text-anchor="middle" font-size="11" fill="#7f8c8d">Anthropic-only · Batch API · tool_use · Async-only · Delta Processing</text>

  <!-- Frontend -->
  <rect x="280" y="70" width="260" height="60" rx="8" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5e2a">React Frontend :5173</text>
  <text x="410" y="112" text-anchor="middle" font-size="10" fill="#2d6a3f">Polling progress · Preloaded digests · Instant persona switch</text>

  <!-- Arrow down -->
  <line x1="410" y1="130" x2="410" y2="155" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="430" y="148" font-size="9" fill="#95a5a6">/api/</text>

  <!-- FastAPI -->
  <rect x="250" y="155" width="320" height="65" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4a6e">FastAPI Backend :8000</text>
  <text x="410" y="195" text-anchor="middle" font-size="10" fill="#2c6690">Async-only · Batch pipeline · tool_use structured output</text>
  <text x="410" y="210" text-anchor="middle" font-size="9" fill="#5499c7">/pipeline/run → /pipeline/status → /digest/{persona_id}</text>

  <!-- Pipeline Box -->
  <rect x="60" y="245" width="700" height="220" rx="8" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="80" y="263" font-size="10" font-weight="bold" fill="#7f8c8d">PIPELINE (async, configurable: batch or async mode)</text>

  <!-- Ingestion -->
  <rect x="80" y="275" width="150" height="55" rx="6" fill="url(#orangeGrad)" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="155" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d4e00">Ingestion</text>
  <text x="155" y="312" text-anchor="middle" font-size="9" fill="#9a6b1e">Threads · Continuations</text>
  <text x="155" y="323" text-anchor="middle" font-size="9" fill="#9a6b1e">Semantic + Structural</text>

  <!-- Arrow -->
  <line x1="230" y1="302" x2="255" y2="302" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Extraction (Batch) -->
  <rect x="255" y="275" width="170" height="55" rx="6" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a4a6e">Extraction</text>
  <text x="340" y="312" text-anchor="middle" font-size="9" fill="#2c6690">Stage 1: Coarse → Stage 2: Enrich</text>
  <text x="340" y="323" text-anchor="middle" font-size="9" fill="#2c6690">Batch API · tool_use · 50% savings</text>

  <!-- Arrow -->
  <line x1="425" y1="302" x2="450" y2="302" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Validation + Filter -->
  <rect x="450" y="275" width="140" height="55" rx="6" fill="url(#redGrad)" stroke="#c0392b" stroke-width="1" filter="url(#shadow)"/>
  <text x="520" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b241c">Validation</text>
  <text x="520" y="312" text-anchor="middle" font-size="9" fill="#943126">Rate-limited · Chunked</text>
  <text x="520" y="323" text-anchor="middle" font-size="9" fill="#943126">Confidence filter ≥0.7</text>

  <!-- Arrow -->
  <line x1="590" y1="302" x2="620" y2="302" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Scoring + Generation -->
  <rect x="620" y="275" width="125" height="55" rx="6" fill="url(#purpleGrad)" stroke="#8e44ad" stroke-width="1" filter="url(#shadow)"/>
  <text x="682" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#512e5f">Scoring</text>
  <text x="682" y="312" text-anchor="middle" font-size="9" fill="#6c3483">5-dim composite</text>
  <text x="682" y="323" text-anchor="middle" font-size="9" fill="#6c3483">Per-persona digests</text>

  <!-- Delta Check -->
  <rect x="80" y="350" width="300" height="45" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
  <text x="230" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">Delta Processing</text>
  <text x="230" y="385" text-anchor="middle" font-size="9" fill="#9a7d0a">Check Postgres for existing bundles → skip unchanged → only extract new</text>

  <!-- Config -->
  <rect x="450" y="350" width="295" height="45" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
  <text x="597" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">Config-Driven</text>
  <text x="597" y="385" text-anchor="middle" font-size="9" fill="#9a7d0a">pipeline.yml (constants) · prompts.yml (all prompts) · .env (secrets)</text>

  <!-- LLM Request Logging -->
  <rect x="80" y="410" width="665" height="35" rx="6" fill="#eaf2f8" stroke="#5dade2" stroke-width="1"/>
  <text x="410" y="432" text-anchor="middle" font-size="10" fill="#2471a3">LLM Request/Response Logging → batch_log table (full JSONB bodies for debugging + replay)</text>

  <!-- Storage Layer -->
  <text x="80" y="480" font-size="10" font-weight="bold" fill="#7f8c8d">PERSISTENCE</text>

  <!-- Postgres -->
  <rect x="80" y="490" width="200" height="70" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4a6e">Postgres :5432</text>
  <text x="180" y="530" text-anchor="middle" font-size="9" fill="#2c6690">Messages · Bundles · Atoms</text>
  <text x="180" y="543" text-anchor="middle" font-size="9" fill="#2c6690">Batch Logs · SQLAlchemy async</text>

  <!-- Neo4j -->
  <rect x="310" y="490" width="200" height="70" rx="8" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5e2a">Neo4j :7687</text>
  <text x="410" y="530" text-anchor="middle" font-size="9" fill="#2d6a3f">Atom → Channel · Workstream</text>
  <text x="410" y="543" text-anchor="middle" font-size="9" fill="#2d6a3f">Graph queries · Persona relevance</text>

  <!-- FAISS -->
  <rect x="540" y="490" width="200" height="70" rx="8" fill="url(#purpleGrad)" stroke="#8e44ad" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="#512e5f">FAISS</text>
  <text x="640" y="530" text-anchor="middle" font-size="9" fill="#6c3483">IndexFlatIP · Cosine similarity</text>
  <text x="640" y="543" text-anchor="middle" font-size="9" fill="#6c3483">Embedding cache · Persistent</text>

  <!-- Anthropic -->
  <rect x="250" y="590" width="320" height="60" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="615" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d4e00">Anthropic Claude API</text>
  <text x="410" y="632" text-anchor="middle" font-size="10" fill="#9a6b1e">Message Batches API · tool_use · 50% cost savings · Rate limit safeguards</text>

  <!-- Arrows from pipeline to storage -->
  <line x1="180" y1="460" x2="180" y2="490" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="410" y1="460" x2="410" y2="490" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="640" y1="460" x2="640" y2="490" stroke="#8e44ad" stroke-width="1.5"/>

  <!-- Arrow from pipeline to Anthropic -->
  <line x1="410" y1="460" x2="410" y2="590" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Arrow from frontend to backend -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>
