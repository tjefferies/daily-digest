<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#d1ecf9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4edda"/>
      <stop offset="100%" stop-color="#c3e6cb"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3cd"/>
      <stop offset="100%" stop-color="#ffeeba"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8d7da"/>
      <stop offset="100%" stop-color="#f5c6cb"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8daef"/>
      <stop offset="100%" stop-color="#d7bde2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1f2eb"/>
      <stop offset="100%" stop-color="#a3e4d7"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980b9"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e67e22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8e44ad"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Daily Digest Tool Architecture</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#7f8c8d">Anthropic | Batch API + tool_use | Async | Delta Processing | YAML-driven config</text>

  <!-- ============ FRONTEND ============ -->
  <rect x="280" y="68" width="340" height="62" rx="8" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5e2a">React Frontend :5173</text>
  <text x="450" y="106" text-anchor="middle" font-size="10" fill="#2d6a3f">Preloads all 3 persona digests on mount | Instant persona switch</text>
  <text x="450" y="120" text-anchor="middle" font-size="9" fill="#2d6a3f">PipelineRunner polls /pipeline/status | PhaseToggle for phase overrides</text>

  <!-- Arrow: Frontend -> Backend -->
  <line x1="450" y1="130" x2="450" y2="152" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="146" font-size="9" fill="#95a5a6">REST</text>

  <!-- ============ FASTAPI ============ -->
  <rect x="250" y="155" width="400" height="65" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4a6e">FastAPI Backend :8000</text>
  <text x="450" y="195" text-anchor="middle" font-size="10" fill="#2c6690">POST /pipeline/run | GET /pipeline/status | GET /digest/{persona_id}</text>
  <text x="450" y="210" text-anchor="middle" font-size="9" fill="#5499c7">Lifespan precook from Neo4j | Background pipeline task | In-memory digest cache</text>

  <!-- ============ PIPELINE BOX ============ -->
  <rect x="30" y="245" width="840" height="275" rx="8" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="50" y="263" font-size="10" font-weight="bold" fill="#7f8c8d">ASYNC PIPELINE (configurable: batch or async extraction mode)</text>

  <!-- Layer 1: Ingestion -->
  <rect x="50" y="275" width="120" height="65" rx="6" fill="url(#orangeGrad)" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d4e00">L1: Ingest</text>
  <text x="110" y="310" text-anchor="middle" font-size="8" fill="#9a6b1e">Group by thread</text>
  <text x="110" y="322" text-anchor="middle" font-size="8" fill="#9a6b1e">Detect continuations</text>
  <text x="110" y="334" text-anchor="middle" font-size="8" fill="#9a6b1e">FAISS similarity</text>

  <!-- Arrow -->
  <line x1="170" y1="307" x2="192" y2="307" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Context Windows -->
  <rect x="195" y="275" width="120" height="65" rx="6" fill="url(#tealGrad)" stroke="#1abc9c" stroke-width="1" filter="url(#shadow)"/>
  <text x="255" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e6655">Windows</text>
  <text x="255" y="310" text-anchor="middle" font-size="8" fill="#148f77">Assemble context</text>
  <text x="255" y="322" text-anchor="middle" font-size="8" fill="#148f77">Token estimation</text>
  <text x="255" y="334" text-anchor="middle" font-size="8" fill="#148f77">Persist to Postgres</text>

  <!-- Arrow -->
  <line x1="315" y1="307" x2="337" y2="307" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Extraction -->
  <rect x="340" y="275" width="140" height="65" rx="6" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="410" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a4a6e">L2: Extract</text>
  <text x="410" y="310" text-anchor="middle" font-size="8" fill="#2c6690">Stage 1: Coarse (8 types)</text>
  <text x="410" y="322" text-anchor="middle" font-size="8" fill="#2c6690">Stage 2: Enrich</text>
  <text x="410" y="334" text-anchor="middle" font-size="8" fill="#2c6690">Batch API + tool_use</text>

  <!-- Arrow -->
  <line x1="480" y1="307" x2="502" y2="307" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Validation -->
  <rect x="505" y="275" width="120" height="65" rx="6" fill="url(#redGrad)" stroke="#c0392b" stroke-width="1" filter="url(#shadow)"/>
  <text x="565" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b241c">L3: Validate</text>
  <text x="565" y="310" text-anchor="middle" font-size="8" fill="#943126">Single batch for all</text>
  <text x="565" y="322" text-anchor="middle" font-size="8" fill="#943126">Per-source-window</text>
  <text x="565" y="334" text-anchor="middle" font-size="8" fill="#943126">Confidence >= 0.7</text>

  <!-- Arrow -->
  <line x1="625" y1="307" x2="647" y2="307" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Scoring -->
  <rect x="650" y="275" width="100" height="65" rx="6" fill="url(#purpleGrad)" stroke="#8e44ad" stroke-width="1" filter="url(#shadow)"/>
  <text x="700" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#512e5f">L4: Score</text>
  <text x="700" y="310" text-anchor="middle" font-size="8" fill="#6c3483">5-dim composite</text>
  <text x="700" y="322" text-anchor="middle" font-size="8" fill="#6c3483">Per-persona rank</text>
  <text x="700" y="334" text-anchor="middle" font-size="8" fill="#6c3483">Critical flagging</text>

  <!-- Arrow -->
  <line x1="750" y1="307" x2="772" y2="307" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: Generation -->
  <rect x="775" y="275" width="80" height="65" rx="6" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1" filter="url(#shadow)"/>
  <text x="815" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5e2a">L5: Gen</text>
  <text x="815" y="310" text-anchor="middle" font-size="8" fill="#2d6a3f">LLM digest</text>
  <text x="815" y="322" text-anchor="middle" font-size="8" fill="#2d6a3f">4 section types</text>
  <text x="815" y="334" text-anchor="middle" font-size="8" fill="#2d6a3f">DigestSection</text>

  <!-- Delta Processing Row -->
  <rect x="50" y="358" width="270" height="40" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
  <text x="185" y="375" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">Delta Processing</text>
  <text x="185" y="389" text-anchor="middle" font-size="8" fill="#9a7d0a">Skip unchanged bundles -> 0 LLM calls on re-run</text>

  <!-- Config-Driven -->
  <rect x="340" y="358" width="270" height="40" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
  <text x="475" y="375" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">YAML Config</text>
  <text x="475" y="389" text-anchor="middle" font-size="8" fill="#9a7d0a">pipeline | prompts | personas | scoring | phases</text>

  <!-- Intermediate Output -->
  <rect x="630" y="358" width="230" height="40" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
  <text x="745" y="375" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">Intermediate JSON</text>
  <text x="745" y="389" text-anchor="middle" font-size="8" fill="#9a7d0a">/tmp/evercurrent/ dump after each pipeline step</text>

  <!-- LLM Request Logging -->
  <rect x="50" y="415" width="810" height="35" rx="6" fill="#eaf2f8" stroke="#5dade2" stroke-width="1"/>
  <text x="450" y="437" text-anchor="middle" font-size="10" fill="#2471a3">LLM Request/Response Logging -> batch_log table (full JSONB request + response bodies for debugging + replay)</text>

  <!-- Scoring Dimensions Label -->
  <rect x="50" y="465" width="810" height="30" rx="6" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1"/>
  <text x="450" y="485" text-anchor="middle" font-size="9" fill="#6c3483">Scoring Dimensions: Workstream Proximity | Role-Type Alignment | Phase Alignment (Concept/EVT/DVT/PVT/MP) | Urgency | Social Signal</text>

  <!-- ============ PERSISTENCE ============ -->
  <text x="50" y="520" font-size="10" font-weight="bold" fill="#7f8c8d">PERSISTENCE</text>

  <!-- Postgres -->
  <rect x="50" y="530" width="240" height="80" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="552" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4a6e">Postgres :5433</text>
  <text x="170" y="567" text-anchor="middle" font-size="9" fill="#2c6690">message | bundle_membership | thread_bundle</text>
  <text x="170" y="580" text-anchor="middle" font-size="9" fill="#2c6690">context_window | atom | batch_log</text>
  <text x="170" y="593" text-anchor="middle" font-size="9" fill="#2c6690">SQLAlchemy async + asyncpg | JSONB columns</text>

  <!-- Neo4j -->
  <rect x="330" y="530" width="240" height="80" rx="8" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="552" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5e2a">Neo4j :7687</text>
  <text x="450" y="567" text-anchor="middle" font-size="9" fill="#2d6a3f">:Atom -> :Channel | :Workstream | :Participant</text>
  <text x="450" y="580" text-anchor="middle" font-size="9" fill="#2d6a3f">EXTRACTED_FROM | ORIGINATES_IN | AFFECTS</text>
  <text x="450" y="593" text-anchor="middle" font-size="9" fill="#2d6a3f">Graph queries for digest fallback + precook</text>

  <!-- FAISS -->
  <rect x="610" y="530" width="240" height="80" rx="8" fill="url(#purpleGrad)" stroke="#8e44ad" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="552" text-anchor="middle" font-size="12" font-weight="bold" fill="#512e5f">FAISS</text>
  <text x="730" y="567" text-anchor="middle" font-size="9" fill="#6c3483">IndexFlatIP + L2 normalization</text>
  <text x="730" y="580" text-anchor="middle" font-size="9" fill="#6c3483">Cosine similarity for continuations</text>
  <text x="730" y="593" text-anchor="middle" font-size="9" fill="#6c3483">CachedEmbedder | sentence-transformers</text>

  <!-- Arrows: Pipeline -> Storage -->
  <line x1="170" y1="500" x2="170" y2="530" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="450" y1="500" x2="450" y2="530" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="730" y1="500" x2="730" y2="530" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ============ EXTERNAL ============ -->
  <text x="50" y="640" font-size="10" font-weight="bold" fill="#7f8c8d">EXTERNAL SERVICES</text>

  <!-- Anthropic -->
  <rect x="50" y="650" width="400" height="60" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="673" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d4e00">Anthropic Claude API</text>
  <text x="250" y="690" text-anchor="middle" font-size="10" fill="#9a6b1e">Message Batches API | tool_use structured output | 50% cost savings</text>
  <text x="250" y="703" text-anchor="middle" font-size="9" fill="#9a6b1e">Exponential backoff (5s->160s) | Rate limit safeguards | claude-haiku-4-5</text>

  <!-- Slack -->
  <rect x="490" y="650" width="180" height="60" rx="8" fill="url(#orangeGrad)" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="580" y="673" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d4e00">Slack</text>
  <text x="580" y="690" text-anchor="middle" font-size="10" fill="#9a6b1e">Source messages</text>
  <text x="580" y="703" text-anchor="middle" font-size="9" fill="#9a6b1e">Fixture data for demo</text>

  <!-- Personas -->
  <rect x="710" y="650" width="140" height="68" rx="8" fill="url(#tealGrad)" stroke="#1abc9c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="673" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e6655">3 Personas</text>
  <text x="780" y="690" text-anchor="middle" font-size="9" fill="#148f77">Maya Chen (ME Lead)</text>
  <text x="780" y="700" text-anchor="middle" font-size="9" fill="#148f77">Elena Vasquez (Supply)</text>
  <text x="780" y="710" text-anchor="middle" font-size="9" fill="#148f77">Ryan Torres (EM)</text>

  <!-- Dashed arrow: Pipeline -> Anthropic (between Postgres and Neo4j) -->
  <line x1="310" y1="500" x2="310" y2="625" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="310" y1="625" x2="250" y2="625" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="250" y1="625" x2="250" y2="650" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="310" y="525" text-anchor="middle" font-size="7" fill="#e67e22">Batch API</text>

  <!-- Data flow summary -->
  <rect x="50" y="730" width="800" height="35" rx="6" fill="#fafafa" stroke="#bdc3c7" stroke-width="1"/>
  <text x="450" y="752" text-anchor="middle" font-size="10" fill="#5d6d7e">307 messages -> 116 thread bundles -> 116 context windows -> 308 atoms -> 5-dim scored -> 4-section digests per persona</text>
</svg>
