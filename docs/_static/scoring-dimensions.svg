<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f4fd"/><stop offset="100%" stop-color="#d1ecf9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4edda"/><stop offset="100%" stop-color="#c3e6cb"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3cd"/><stop offset="100%" stop-color="#ffeeba"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8d7da"/><stop offset="100%" stop-color="#f5c6cb"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8daef"/><stop offset="100%" stop-color="#d7bde2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1f2eb"/><stop offset="100%" stop-color="#a3e4d7"/>
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eaecee"/><stop offset="100%" stop-color="#d5d8dc"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="380" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Five-Dimension Composite Relevance Scoring</text>

  <!-- ── Input boxes: all 5 in a single row at y=45 ── -->
  <!-- Box widths: 138px each, gap: 10px, total = 5*138 + 4*10 = 730, start x = (760-730)/2 = 15 -->

  <!-- Dim 1: Workstream Proximity  x=15 -->
  <rect x="15" y="45" width="138" height="70" rx="6" fill="url(#slateGrad)" stroke="#7f8c8d" stroke-width="1" filter="url(#shadow)"/>
  <text x="84" y="66" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2c3e50">Workstream</text>
  <text x="84" y="79" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2c3e50">Proximity</text>
  <text x="84" y="93" text-anchor="middle" font-size="8.5" fill="#5d6d7e">weight: 0.30</text>
  <text x="84" y="107" text-anchor="middle" font-size="7.5" fill="#7f8c8d">originating=1.0, affected=0.7</text>

  <!-- Dim 2: Role-Type  x=163 -->
  <rect x="163" y="45" width="138" height="70" rx="6" fill="url(#slateGrad)" stroke="#7f8c8d" stroke-width="1" filter="url(#shadow)"/>
  <text x="232" y="72" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2c3e50">Role-Type</text>
  <text x="232" y="89" text-anchor="middle" font-size="8.5" fill="#5d6d7e">weight: 0.20</text>
  <text x="232" y="107" text-anchor="middle" font-size="7.5" fill="#7f8c8d">5x8 role-type affinity matrix</text>

  <!-- Dim 3: Phase Alignment  x=311 -->
  <rect x="311" y="45" width="138" height="70" rx="6" fill="url(#slateGrad)" stroke="#7f8c8d" stroke-width="1" filter="url(#shadow)"/>
  <text x="380" y="72" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2c3e50">Phase Alignment</text>
  <text x="380" y="89" text-anchor="middle" font-size="8.5" fill="#5d6d7e">weight: 0.20</text>
  <text x="380" y="107" text-anchor="middle" font-size="7.5" fill="#7f8c8d">graduated: 0=1.0, 1=0.75, 2=0.5</text>

  <!-- Dim 4: Urgency  x=459 -->
  <rect x="459" y="45" width="138" height="70" rx="6" fill="url(#slateGrad)" stroke="#7f8c8d" stroke-width="1" filter="url(#shadow)"/>
  <text x="528" y="72" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2c3e50">Urgency</text>
  <text x="528" y="89" text-anchor="middle" font-size="8.5" fill="#5d6d7e">weight: 0.15</text>
  <text x="528" y="107" text-anchor="middle" font-size="7.5" fill="#7f8c8d">low=0.25 med=0.5 high=0.75 crit=1.0</text>

  <!-- Dim 5: Social Signal  x=607 -->
  <rect x="607" y="45" width="138" height="70" rx="6" fill="url(#slateGrad)" stroke="#7f8c8d" stroke-width="1" filter="url(#shadow)"/>
  <text x="676" y="72" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2c3e50">Social Signal</text>
  <text x="676" y="89" text-anchor="middle" font-size="8.5" fill="#5d6d7e">weight: 0.15</text>
  <text x="676" y="107" text-anchor="middle" font-size="7.5" fill="#7f8c8d">collaborator graph proximity</text>

  <!-- ── Composite Score box (centered, below inputs) ── -->
  <!-- Score box: x=280, y=185, width=200, height=55; center-x=380, top=185 -->
  <rect x="280" y="185" width="200" height="55" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4a6e">Composite Score</text>
  <text x="380" y="226" text-anchor="middle" font-size="9" fill="#2c6690">relevance(a, p) = Sigma wi * di(a, p)</text>

  <!-- ── Arrows from each input box bottom to score box top ── -->
  <!-- Score box top-center: (380, 185) -->
  <!-- Each line goes from box-bottom-center to score box top, with arrowhead at the score end -->

  <!-- Dim 1 bottom-center: (84, 115) → score top approximation, angled to (380,185) -->
  <line x1="84" y1="115" x2="316" y2="183" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Dim 2 bottom-center: (232, 115) → (355,185) -->
  <line x1="232" y1="115" x2="348" y2="183" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Dim 3 bottom-center: (380, 115) → (380,185) straight down -->
  <line x1="380" y1="115" x2="380" y2="183" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Dim 4 bottom-center: (528, 115) → (412,185) -->
  <line x1="528" y1="115" x2="414" y2="183" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Dim 5 bottom-center: (676, 115) → (446,185) -->
  <line x1="676" y1="115" x2="446" y2="183" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- ── Bottom output description ── -->
  <rect x="80" y="260" width="600" height="50" rx="6" fill="#fafafa" stroke="#bdc3c7" stroke-width="1"/>
  <text x="380" y="280" text-anchor="middle" font-size="10" fill="#5d6d7e">Atoms ranked by composite score | Top N per persona (default: 25)</text>
  <text x="380" y="297" text-anchor="middle" font-size="10" fill="#5d6d7e">Critical threshold (0.85) overrides rank | Weights are persona-specific</text>
</svg>
