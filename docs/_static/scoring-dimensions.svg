<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f4fd"/><stop offset="100%" stop-color="#d1ecf9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4edda"/><stop offset="100%" stop-color="#c3e6cb"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3cd"/><stop offset="100%" stop-color="#ffeeba"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8d7da"/><stop offset="100%" stop-color="#f5c6cb"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8daef"/><stop offset="100%" stop-color="#d7bde2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1f2eb"/><stop offset="100%" stop-color="#a3e4d7"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Five-Dimension Composite Relevance Scoring</text>

  <!-- Center: Composite Score -->
  <rect x="260" y="140" width="200" height="55" rx="8" fill="url(#purpleGrad)" stroke="#8e44ad" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#512e5f">Composite Score</text>
  <text x="360" y="180" text-anchor="middle" font-size="9" fill="#6c3483">relevance(a, p) = Sigma wi * di(a, p)</text>

  <!-- Lines from center to dimensions -->
  <line x1="260" y1="155" x2="200" y2="85" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="310" y1="140" x2="310" y2="95" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="410" y1="140" x2="410" y2="95" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="460" y1="155" x2="530" y2="85" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="360" y1="195" x2="360" y2="240" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Dim 1: Workstream Proximity (top-left) -->
  <rect x="30" y="45" width="195" height="65" rx="6" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="128" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a4a6e">Workstream Proximity</text>
  <text x="128" y="80" text-anchor="middle" font-size="9" fill="#2c6690">weight: 0.30</text>
  <text x="128" y="95" text-anchor="middle" font-size="8" fill="#5499c7">originating=1.0, affected=0.7, affinity vector</text>

  <!-- Dim 2: Role-Type (top-center-left) -->
  <rect x="240" y="45" width="150" height="65" rx="6" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1" filter="url(#shadow)"/>
  <text x="315" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5e2a">Role-Type</text>
  <text x="315" y="80" text-anchor="middle" font-size="9" fill="#2d6a3f">weight: 0.20</text>
  <text x="315" y="95" text-anchor="middle" font-size="8" fill="#2d6a3f">5x8 role-type affinity matrix</text>

  <!-- Dim 3: Phase Alignment (top-center-right) -->
  <rect x="405" y="45" width="150" height="65" rx="6" fill="url(#orangeGrad)" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d4e00">Phase Alignment</text>
  <text x="480" y="80" text-anchor="middle" font-size="9" fill="#9a6b1e">weight: 0.20</text>
  <text x="480" y="95" text-anchor="middle" font-size="8" fill="#9a6b1e">graduated: 0=1.0, 1=0.75, 2=0.5...</text>

  <!-- Dim 4: Urgency (top-right) -->
  <rect x="570" y="45" width="140" height="65" rx="6" fill="url(#redGrad)" stroke="#c0392b" stroke-width="1" filter="url(#shadow)"/>
  <text x="640" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b241c">Urgency</text>
  <text x="640" y="80" text-anchor="middle" font-size="9" fill="#943126">weight: 0.15</text>
  <text x="640" y="95" text-anchor="middle" font-size="8" fill="#943126">low=0.25 med=0.5 high=0.75 crit=1.0</text>

  <!-- Dim 5: Social Signal (bottom) -->
  <rect x="260" y="240" width="200" height="55" rx="6" fill="url(#tealGrad)" stroke="#1abc9c" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e6655">Social Signal</text>
  <text x="360" y="275" text-anchor="middle" font-size="9" fill="#148f77">weight: 0.15</text>
  <text x="360" y="290" text-anchor="middle" font-size="8" fill="#148f77">collaborator graph proximity</text>

  <!-- Bottom: Output description -->
  <rect x="80" y="325" width="560" height="50" rx="6" fill="#fafafa" stroke="#bdc3c7" stroke-width="1"/>
  <text x="360" y="345" text-anchor="middle" font-size="10" fill="#5d6d7e">Atoms ranked by composite score | Top N per persona (default: 25)</text>
  <text x="360" y="362" text-anchor="middle" font-size="10" fill="#5d6d7e">Critical threshold (0.85) overrides rank | Weights are persona-specific</text>
</svg>
